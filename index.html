    <nav class="navbar glass-nav"><div class="container nav-inner">

        <div class="nav-links">

    <main class="container py-4">
        <div class="hero-section text-center mb-4"><h1 class="gradient-text">Workout Architect</h1><p class="text-muted">Build your perfect workout routine</p></div>
    <div class="d-flex gap-4" style="flex-wrap:wrap;">
        <div class="glass-card p-4" style="flex:1;min-width:300px;">
            <h3>Build Routine</h3>
            <select id="muscleGroup" class="form-control mb-2"><option>Chest</option><option>Back</option><option>Legs</option><option>Arms</option><option>Shoulders</option><option>Core</option><option>Full Body</option></select>
            <div id="exerciseList" class="mt-3"></div>
        </div>
        <div class="glass-card p-4 text-center" style="flex:1;min-width:300px;">
            <h3>⏱️ Workout Timer</h3>
            <div id="timerDisplay" style="font-size:5rem;font-weight:800;font-family:monospace;color:var(--clr-primary,#6366f1);">00:00</div>
            <div class="d-flex gap-2 justify-content-center mt-3"><button class="btn btn-primary" id="startTimer">▶ Start</button><button class="btn btn-secondary" id="resetTimer">↺ Reset</button></div>
            <div class="mt-4"><h4>My Routine</h4><div id="myRoutine"></div></div>
